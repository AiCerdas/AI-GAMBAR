<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AbidinAI Image Generator</title>

<style>
body {
  font-family: Arial;
  background: #0f172a;
  color: white;
  text-align: center;
  padding: 50px;
}
input {
  width: 300px;
  padding: 10px;
  border-radius: 8px;
  border: none;
}
button {
  padding: 10px 20px;
  border-radius: 8px;
  border: none;
  background: #22c55e;
  color: white;
  cursor: pointer;
}
img {
  margin-top: 20px;
  max-width: 400px;
  border-radius: 10px;
}
</style>
</head>

<body>

<h1>🔥 AbidinAI Image Generator</h1>

<input type="text" id="prompt" placeholder="Contoh: robot futuristik, cinematic">
<button onclick="generate()">Generate</button>

<br>
<img id="result" />

<script>
async function generate() {
  const prompt = document.getElementById("prompt").value;
  const img = document.getElementById("result");

  img.src = "https://i.imgur.com/6RMhx.gif"; // loading

  const res = await fetch("/api/generate", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({ prompt })
  });

  const data = await res.json();
  img.src = data.image;
}
</script>

</body>
</html>
