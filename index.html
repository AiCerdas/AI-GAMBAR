<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Image Generator | Futuristic</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --bg-color: #050a18;
            --card-bg: #0d162d;
            --accent-color: #00d2ff;
            --text-color: #e0e6ed;
            --neon-shadow: 0 0 15px rgba(0, 210, 255, 0.5);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            background-image: 
                radial-gradient(circle at 20% 30%, rgba(0, 210, 255, 0.05) 0%, transparent 40%),
                radial-gradient(circle at 80% 70%, rgba(0, 210, 255, 0.05) 0%, transparent 40%);
            color: var(--text-color);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 600px;
            background: var(--card-bg);
            padding: 30px;
            border-radius: 20px;
            border: 1px solid rgba(0, 210, 255, 0.2);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            text-align: center;
        }

        h1 {
            font-size: 1.8rem;
            margin-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--accent-color);
            text-shadow: var(--neon-shadow);
        }

        .input-group {
            margin-bottom: 20px;
        }

        textarea {
            width: 100%;
            padding: 15px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(0, 210, 255, 0.3);
            border-radius: 10px;
            color: white;
            resize: none;
            outline: none;
            transition: 0.3s;
        }

        textarea:focus {
            border-color: var(--accent-color);
            box-shadow: var(--neon-shadow);
        }

        button {
            width: 100%;
            padding: 12px;
            background: linear-gradient(45deg, #00d2ff, #3a7bd5);
            border: none;
            border-radius: 10px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            transition: 0.3s;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: var(--neon-shadow);
        }

        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .result-area {
            margin-top: 25px;
            min-height: 200px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        #outputImage {
            width: 100%;
            border-radius: 12px;
            display: none;
            border: 2px solid rgba(0, 210, 255, 0.1);
        }

        /* Loading Animation */
        .loader {
            display: none;
            width: 50px;
            height: 50px;
            border: 5px solid rgba(0, 210, 255, 0.1);
            border-top: 5px solid var(--accent-color);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        #downloadBtn {
            margin-top: 15px;
            display: none;
            background: #27ae60;
        }

        @media (max-width: 480px) {
            .container { padding: 20px; }
            h1 { font-size: 1.4rem; }
        }
    </style>
</head>
<body>

<div class="container">
    <h1><i class="fas fa-microchip"></i> AI Visualizer</h1>
    
    <div class="input-group">
        <textarea id="promptInput" rows="3" placeholder="Describe the image you want to create..."></textarea>
    </div>

    <button id="generateBtn">
        <span id="btnText">Generate Image</span>
        <div class="loader" id="loader"></div>
    </button>

    <div class="result-area">
        <img id="outputImage" src="" alt="Generated AI Content">
        <button id="downloadBtn"><i class="fas fa-download"></i> Download Image</button>
    </div>
</div>

<script>
    const generateBtn = document.getElementById('generateBtn');
    const promptInput = document.getElementById('promptInput');
    const outputImage = document.getElementById('outputImage');
    const loader = document.getElementById('loader');
    const btnText = document.getElementById('btnText');
    const downloadBtn = document.getElementById('downloadBtn');

    generateBtn.addEventListener('click', async () => {
        const prompt = promptInput.value.trim();
        if (!prompt) return alert('Please enter a prompt!');

        // UI State: Loading
        generateBtn.disabled = true;
        loader.style.display = 'block';
        btnText.style.display = 'none';
        outputImage.style.display = 'none';
        downloadBtn.style.display = 'none';

        try {
            const response = await fetch('/api/generate', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ prompt })
            });

            const data = await response.json();

            if (data.image) {
                outputImage.src = data.image;
                outputImage.style.display = 'block';
                downloadBtn.style.display = 'flex';
                
                // Set up download function
                downloadBtn.onclick = () => {
                    const link = document.createElement('a');
                    link.href = data.image;
                    link.download = `ai-image-${Date.now()}.jpg`;
                    link.click();
                };
            } else {
                alert('Error: ' + (data.error || 'Unknown error occurred'));
            }
        } catch (error) {
            console.error(error);
            alert('Failed to connect to the server.');
        } finally {
            generateBtn.disabled = false;
            loader.style.display = 'none';
            btnText.style.display = 'block';
        }
    });
</script>

</body>
</html>
