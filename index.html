
<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ABIDINAI Image Generator</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial, sans-serif;
    }

    body{
      background:#0f172a;
      color:white;
      min-height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      padding:20px;
    }

    .container{
      width:100%;
      max-width:700px;
      background:#111827;
      padding:25px;
      border-radius:20px;
      box-shadow:0 0 20px rgba(0,0,0,0.5);
    }

    h1{
      text-align:center;
      margin-bottom:20px;
      font-size:35px;
      color:#38bdf8;
    }

    textarea{
      width:100%;
      height:130px;
      border:none;
      outline:none;
      border-radius:15px;
      padding:15px;
      background:#1e293b;
      color:white;
      resize:none;
      font-size:16px;
      margin-bottom:15px;
    }

    button{
      width:100%;
      padding:15px;
      border:none;
      border-radius:15px;
      background:#0ea5e9;
      color:white;
      font-size:18px;
      cursor:pointer;
      transition:0.3s;
      font-weight:bold;
    }

    button:hover{
      background:#0284c7;
    }

    .loading{
      text-align:center;
      margin-top:20px;
      display:none;
      color:#38bdf8;
      font-size:18px;
    }

    .result{
      margin-top:25px;
      text-align:center;
    }

    .result img{
      width:100%;
      border-radius:15px;
      margin-top:10px;
      border:3px solid #38bdf8;
    }

    .download-btn{
      margin-top:15px;
      display:inline-block;
      padding:12px 20px;
      background:#22c55e;
      color:white;
      text-decoration:none;
      border-radius:12px;
      font-weight:bold;
    }

    .download-btn:hover{
      background:#16a34a;
    }

    .footer{
      text-align:center;
      margin-top:20px;
      color:#94a3b8;
      font-size:14px;
    }
  </style>
</head>
<body>

<div class="container">
  <h1>ABIDINAI</h1>

  <textarea id="prompt" placeholder="Masukkan prompt gambar AI..."></textarea>

  <button onclick="generateImage()">Generate Gambar</button>

  <div class="loading" id="loading">
    Sedang membuat gambar AI...
  </div>

  <div class="result" id="result"></div>

  <div class="footer">
    Powered by Hugging Face API
  </div>
</div>

<script>
async function generateImage() {

  const prompt = document.getElementById("prompt").value;

  if(!prompt){
    alert("Masukkan prompt dulu");
    return;
  }

  const loading = document.getElementById("loading");
  const result = document.getElementById("result");

  loading.style.display = "block";
  result.innerHTML = "";

  try {

    const response = await fetch("/api/generate", {
      method:"POST",
      headers:{
        "Content-Type":"application/json"
      },
      body:JSON.stringify({ prompt })
    });

    if(!response.ok){
      throw new Error("Gagal generate gambar");
    }

    const blob = await response.blob();

    const imageUrl = URL.createObjectURL(blob);

    result.innerHTML = `
      <img src="${imageUrl}" />
      <br>
      <a href="${imageUrl}" download="abidinai.png" class="download-btn">
        Download Gambar
      </a>
    `;

  } catch(err){
    result.innerHTML = `
      <p style="color:red;">
        Error: ${err.message}
      </p>
    `;
  }

  loading.style.display = "none";
}
</script>

</body>
</html>
